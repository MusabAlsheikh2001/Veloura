<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Veloura premium light hero background">
  <defs>
    <!-- Veloura palette: Bone Ivory, Velvet Burgundy, Dark Wine, Champagne Gold, Smoky Black -->
    <linearGradient id="ivoryBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9F1"/>
      <stop offset="42%" stop-color="#F5EFE7"/>
      <stop offset="100%" stop-color="#EDE2D6"/>
    </linearGradient>

    <radialGradient id="warmCenter" cx="42%" cy="33%" r="70%">
      <stop offset="0%" stop-color="#FFFDF8" stop-opacity="0.96"/>
      <stop offset="48%" stop-color="#F5EFE7" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#C6A77B" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="burgundyWash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5A1E2A" stop-opacity="0.50"/>
      <stop offset="36%" stop-color="#5A1E2A" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#3A0F18" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="wineDepth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3A0F18" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#3A0F18" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="goldAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E4C996" stop-opacity="0.58"/>
      <stop offset="38%" stop-color="#C6A77B" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#C6A77B" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="champagneLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C6A77B" stop-opacity="0"/>
      <stop offset="42%" stop-color="#C6A77B" stop-opacity="0.34"/>
      <stop offset="62%" stop-color="#5A1E2A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#C6A77B" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="edgeShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="62%" stop-color="#F5EFE7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3A0F18" stop-opacity="0.018"/>
    </linearGradient>

    <filter id="blurXL" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="96"/>
    </filter>

    <filter id="blurM" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.025"/>
      </feComponentTransfer>
    </filter>

    <pattern id="fineGrid" width="92" height="92" patternUnits="userSpaceOnUse">
      <path d="M92 0H0V92" fill="none" stroke="#3A0F18" stroke-opacity="0.028" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="1100" fill="url(#ivoryBase)"/>
  <rect width="1600" height="1100" fill="url(#warmCenter)"/>
  <rect width="1600" height="1100" fill="url(#fineGrid)" opacity="0.42"/>

  <!-- Premium color field: restrained, concentrated to the right for hero text readability on the left -->
  <g filter="url(#blurXL)">
    <ellipse cx="1290" cy="260" rx="520" ry="430" fill="url(#burgundyWash)"/>
    <ellipse cx="1475" cy="130" rx="380" ry="330" fill="url(#wineDepth)" opacity="0.72"/>
    <ellipse cx="1120" cy="410" rx="520" ry="360" fill="url(#goldAura)" opacity="0.82"/>
    <ellipse cx="560" cy="40" rx="460" ry="220" fill="url(#goldAura)" opacity="0.38"/>
    <ellipse cx="1450" cy="900" rx="460" ry="260" fill="url(#burgundyWash)" opacity="0.42"/>
  </g>

  <!-- Elegant silk-like movement, very subtle -->
  <g filter="url(#blurM)" opacity="0.82">
    <path d="M580 160 C 860 80, 1035 205, 1275 145 C 1425 108, 1505 78, 1685 120" fill="none" stroke="url(#champagneLine)" stroke-width="2.4"/>
    <path d="M690 260 C 905 198, 1085 305, 1320 236 C 1465 194, 1560 186, 1708 254" fill="none" stroke="url(#champagneLine)" stroke-width="1.8" opacity="0.72"/>
    <path d="M760 865 C 980 770, 1182 875, 1392 790 C 1512 742, 1600 728, 1725 780" fill="none" stroke="url(#champagneLine)" stroke-width="1.55" opacity="0.50"/>
  </g>

  <!-- Refined burgundy contour, almost invisible but gives brand character -->
  <path d="M1076 0 C 1182 182, 1180 346, 1338 477 C 1468 585, 1593 641, 1660 845" fill="none" stroke="#5A1E2A" stroke-opacity="0.075" stroke-width="1.3"/>
  <path d="M1168 -20 C 1230 178, 1274 330, 1426 451 C 1534 537, 1640 615, 1710 790" fill="none" stroke="#C6A77B" stroke-opacity="0.11" stroke-width="1.2"/>

  <!-- Soft readable text area wash -->
  <radialGradient id="leftReadability" cx="20%" cy="42%" r="46%">
    <stop offset="0%" stop-color="#FFFDF8" stop-opacity="0.76"/>
    <stop offset="65%" stop-color="#FFF9F1" stop-opacity="0.26"/>
    <stop offset="100%" stop-color="#FFF9F1" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="1100" fill="url(#leftReadability)"/>

  <rect width="1600" height="1100" fill="url(#edgeShade)"/>
  <rect width="1600" height="1100" filter="url(#grain)" opacity="0.16"/>
</svg>
