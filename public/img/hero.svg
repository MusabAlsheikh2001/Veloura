<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract velvet and champagne light">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#190910"/>
      <stop offset="46%" stop-color="#11080b"/>
      <stop offset="100%" stop-color="#060304"/>
    </linearGradient>

    <radialGradient id="burgundy" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8e2b3e"/>
      <stop offset="42%" stop-color="#561d28"/>
      <stop offset="100%" stop-color="#3a0f18" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="wine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#43141f"/>
      <stop offset="100%" stop-color="#260b11" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e7cda0"/>
      <stop offset="34%" stop-color="#c6a77b" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#c6a77b" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ember" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b03e54" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7a2233" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e7cda0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e7cda0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e7cda0" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bottomDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="34%" stop-color="#060304" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050203" stop-opacity="0.7"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="32%" r="80%">
      <stop offset="48%" stop-color="#060304" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040203" stop-opacity="0.8"/>
    </radialGradient>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="100"/>
    </filter>

    <filter id="softer" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.1"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1100" fill="url(#base)"/>

  <!-- Deep velvet field with a contained champagne highlight, up top -->
  <g filter="url(#soft)">
    <ellipse cx="840" cy="270" rx="720" ry="500" fill="url(#burgundy)"/>
    <ellipse cx="1330" cy="190" rx="460" ry="420" fill="url(#wine)"/>
    <ellipse cx="250" cy="240" rx="440" ry="400" fill="url(#wine)"/>
    <ellipse cx="1050" cy="250" rx="460" ry="380" fill="url(#gold)" opacity="0.55"/>
    <ellipse cx="720" cy="220" rx="320" ry="260" fill="url(#ember)" opacity="0.4"/>
    <ellipse cx="800" cy="720" rx="780" ry="340" fill="url(#wine)" opacity="0.35"/>
  </g>

  <!-- Silk sheen: faint champagne arcs catching the light -->
  <g filter="url(#softer)">
    <path d="M-80 410 C 420 280, 1000 450, 1720 230" fill="none" stroke="url(#sheen)" stroke-width="2.5" opacity="0.45"/>
    <path d="M-80 480 C 460 340, 1020 520, 1720 310" fill="none" stroke="url(#sheen)" stroke-width="2" opacity="0.32"/>
  </g>

  <rect width="1600" height="1100" fill="url(#bottomDark)"/>
  <rect width="1600" height="1100" fill="url(#vignette)"/>
  <rect width="1600" height="1100" filter="url(#grain)" opacity="0.5"/>
</svg>
