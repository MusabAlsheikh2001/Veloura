        "inLanguage": ["en", "ar"],
        "publisher": { "@id": "https://veloura.com/#organization" }
      },
      {
        "@type": "ProfessionalService",
        "@id": "https://veloura.com/#professional-service",
        "name": "Veloura",

      }
    ]
  }
  </script>

  <!-- Apply saved theme + language before paint to avoid any flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('veloura-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        var p = window.location.pathname.split('/').filter(Boolean)[0];
        var l = (p === 'en' || p === 'ar') ? p : localStorage.getItem('veloura-lang');
        if (l !== 'en' && l !== 'ar') { l = 'en'; }
        var root = document.documentElement;
        root.setAttribute('data-theme', t);
        root.setAttribute('lang', l);
        root.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
      } catch (e) { }
    })();
  </script>
