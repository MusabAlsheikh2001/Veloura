<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Veloura — Premium Marketing & Digital Growth</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description"
    content="Veloura is a premium marketing and digital growth agency. We help brands grow through strategy, elegant design, performance marketing, and digital systems built for measurable impact.">
  <link rel="canonical" href="https://veloura.com/">
  <meta name="theme-color" content="#F5EFE7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Veloura">
  <meta property="og:title" content="Veloura — Premium Marketing & Digital Growth">
  <meta property="og:description"
    content="Marketing that feels refined, performs with purpose. Strategy, design, performance marketing, and digital systems for brands that want to grow smarter.">
  <meta property="og:url" content="https://veloura.com/">
  <meta property="og:image" content="https://veloura.com/img/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Veloura — Marketing that feels refined, performs with purpose.">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="ar_AR">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Veloura — Premium Marketing & Digital Growth">
  <meta name="twitter:description"
    content="Marketing that feels refined, performs with purpose. Strategy, design, performance marketing, and digital systems for brands that want to grow smarter.">
  <meta name="twitter:image" content="https://veloura.com/img/og-image.jpg">

  <!-- Icons + PWA -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Veloura">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts: Fraunces (display serif) + Inter (Latin body) + Tajawal (Arabic) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400..500&family=Inter:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <!-- Organization + WebSite structured data (static so crawlers always see it) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://veloura.com/#organization",
        "name": "Veloura",
        "url": "https://veloura.com/",
        "logo": "https://veloura.com/icon-512.png",
        "image": "https://veloura.com/img/og-image.jpg",
        "email": "hello@veloura.com",
        "description": "Premium marketing and digital growth agency — strategy, elegant design, performance marketing, and digital systems built for measurable impact.",
        "knowsLanguage": ["en", "ar"]
      },
      {
        "@type": "WebSite",
        "@id": "https://veloura.com/#website",
        "name": "Veloura",
        "url": "https://veloura.com/",
        "inLanguage": ["en", "ar"],
        "publisher": { "@id": "https://veloura.com/#organization" }
      }
    ]
  }
  </script>

  <!-- Apply saved theme + language before paint to avoid any flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('veloura-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        var l = localStorage.getItem('veloura-lang');
        if (l !== 'en' && l !== 'ar') { l = 'en'; }
        var root = document.documentElement;
        root.setAttribute('data-theme', t);
        root.setAttribute('lang', l);
        root.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
      } catch (e) { }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
